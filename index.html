<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>체육센터 경품 추첨 프로그램</title>
<style>
    * { box-sizing: border-box; }
    body {
        margin: 0;
        font-family: Arial, "Noto Sans KR", sans-serif;
        background: #f4f7fb;
        color: #222;
        text-align: center;
    }
    .container {
        width: 92%;
        max-width: 920px;
        margin: 0 auto;
        padding: 28px 0 56px;
    }
    .card {
        background: #fff;
        border-radius: 20px;
        padding: 24px;
        margin: 18px 0;
        box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }
    h1 { font-size: 31px; margin: 8px 0 10px; }
    h2 { font-size: 22px; margin-top: 0; }
    h3 { margin-bottom: 8px; }
    .desc { color: #666; font-size: 15px; line-height: 1.55; }
    .form-row {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 10px;
    }
    input {
        width: 100%;
        max-width: 300px;
        padding: 15px;
        font-size: 18px;
        border: 1px solid #ccc;
        border-radius: 12px;
        text-align: center;
        background: white;
    }
    input.small { max-width: 190px; }
    button {
        border: none;
        border-radius: 12px;
        padding: 14px 22px;
        font-size: 17px;
        cursor: pointer;
        margin: 6px;
        background: #2f6fed;
        color: white;
        font-weight: bold;
    }
    button.secondary { background: #555; }
    button.danger { background: #d93025; }
    button.light { background: #e9edf5; color: #222; }
    button.green { background: #188038; }
    button.orange { background: #f29900; color: #222; }
    #result {
        margin-top: 24px;
        font-size: 54px;
        font-weight: bold;
        min-height: 72px;
    }
    .winner { color: #138a36; }
    .loser { color: #d93025; }
    .closed { color: #555; font-size: 42px !important; }
    .hidden { display: none; }
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-top: 14px;
    }
    .stat-box {
        background: #f2f5fb;
        border-radius: 14px;
        padding: 18px 8px;
    }
    .stat-label { color: #555; font-size: 15px; font-weight: bold; }
    .stat-number { font-size: 34px; font-weight: bold; margin-top: 8px; }
    .list {
        text-align: left;
        max-height: 340px;
        overflow-y: auto;
        background: #f7f8fa;
        border-radius: 12px;
        padding: 14px;
        margin-top: 12px;
        font-size: 14px;
        line-height: 1.8;
    }
    .notice { font-size: 14px; color: #777; margin-top: 10px; }
    .setting-box {
        background: #f7f9fd;
        border-radius: 16px;
        padding: 16px;
        margin-top: 12px;
    }
    .edit-box {
        background: #fff7e8;
        border: 1px solid #f0c36d;
        border-radius: 16px;
        padding: 16px;
        margin: 14px 0;
        text-align: center;
    }
    .stats-panel {
        background: #f9fbff;
        border: 1px solid #dce6ff;
        border-radius: 16px;
        padding: 18px;
        margin: 14px 0;
    }
    .badge {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: #eef3ff;
        color: #2f6fed;
        font-weight: bold;
        margin: 3px;
        font-size: 14px;
    }
    .pool-item {
        background: #f7f9fd;
        border-radius: 14px;
        padding: 14px;
        margin: 10px 0;
        text-align: left;
    }
    .pool-title {
        font-weight: bold;
        font-size: 16px;
        margin-bottom: 6px;
    }
    .pool-actions { margin-top: 10px; text-align: center; }
    .selected-pool { border: 2px solid #2f6fed; background: #eef3ff; }
    .top-actions { margin-top: 16px; }
    @media (max-width: 560px) {
        h1 { font-size: 25px; }
        #result { font-size: 44px; }
        .stats-grid { grid-template-columns: 1fr; }
        .card { padding: 20px 16px; }
        button { width: 100%; max-width: 330px; }
        input, input.small { max-width: 330px; }
    }
</style>
</head>
<body>

<div class="container">
    <h1>체육센터 경품 추첨</h1>
    <p class="desc">
        첫 화면에서는 결과표를 만들고 관리합니다.<br>
        생성된 이벤트의 <b>사용하기</b>를 누르면 참가자 확인 화면으로 이동합니다.
    </p>

    <div id="adminScreen">
        <div class="card">
            <h2>결과표 만들기</h2>
            <p class="desc">새로운 행사 결과표를 생성하는 공간입니다.</p>

            <div class="setting-box">
                <div class="form-row">
                    <input type="text" id="poolName" placeholder="결과표 이름 예: 7월 이벤트">
                    <input type="number" id="totalSetting" min="1" max="1000" value="100" placeholder="총 결과표 개수">
                    <input type="number" id="winSetting" min="0" max="1000" value="10" placeholder="당첨 개수">
                </div>
                <p id="settingPreview" class="notice"></p>
                <button class="green" onclick="createNewPoolFromForm()">결과표 생성</button>
            </div>
        </div>

        <div class="card">
            <h2>결과표 관리</h2>
            <p class="desc">
                생성된 이벤트를 클릭하면 아래에 통계가 표시됩니다.<br>
                수정/삭제/사용도 이곳에서 진행합니다.
            </p>

            <div id="editPanel" class="edit-box hidden">
                <h3>결과표 수정하기</h3>
                <div class="form-row">
                    <input type="text" id="editPoolName" placeholder="결과표 이름">
                    <input type="number" id="editTotalSetting" min="1" max="1000" placeholder="총 결과표 개수">
                    <input type="number" id="editWinSetting" min="0" max="1000" placeholder="당첨 개수">
                </div>
                <p id="editPreview" class="notice"></p>
                <button class="orange" onclick="saveEditPool()">수정 저장</button>
                <button class="light" onclick="cancelEdit()">수정 취소</button>
            </div>

            <div id="poolList" class="list">생성된 결과표가 없습니다.</div>

            <div id="selectedStatsPanel" class="stats-panel hidden">
                <h3>통계 자료</h3>
                <div id="eventBadges"></div>

                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-label">총 참여자</div>
                        <div id="totalCount" class="stat-number">0/0</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">당첨 지급</div>
                        <div id="winCount" class="stat-number">0/0</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">꽝 지급</div>
                        <div id="loseCount" class="stat-number">0/0</div>
                    </div>
                </div>

                <div class="top-actions">
                    <button class="light" onclick="downloadCSV()">엑셀용 기록 다운로드</button>
                </div>

                <h3>당첨자 명단</h3>
                <div id="winnerList" class="list">당첨자가 없습니다.</div>

                <h3>참여 기록</h3>
                <div id="historyList" class="list">참여 기록이 없습니다.</div>
            </div>
        </div>
    </div>

    <div id="participantScreen" class="hidden">
        <div class="card">
            <h2>참가자 확인</h2>
            <div id="activePoolNotice" class="notice"></div>
            <div class="form-row">
                <input type="text" id="participantName" placeholder="이름 입력">
                <input type="tel" id="phoneLast4" class="small" maxlength="4" placeholder="휴대폰 뒤 4자리">
            </div>
            <button onclick="joinDraw()">결과 확인</button>
            <div id="result"></div>
            <button id="surveyButton" class="secondary hidden" onclick="goSurvey()">확인</button>
            <p id="message" class="notice"></p>
            <div class="top-actions">
                <button class="light" onclick="showAdminScreen()">관리 화면으로 돌아가기</button>
            </div>
        </div>
    </div>
</div>

<script>
const SURVEY_URL = "";

let pools = JSON.parse(localStorage.getItem("eventPools") || "[]");
let selectedPoolId = localStorage.getItem("selectedPoolId") || "";
let activePoolId = localStorage.getItem("activePoolId") || "";
let editingPoolId = "";

if (!selectedPoolId && pools.length > 0) selectedPoolId = pools[0].id;

function saveAll() {
    localStorage.setItem("eventPools", JSON.stringify(pools));
    localStorage.setItem("selectedPoolId", selectedPoolId);
    localStorage.setItem("activePoolId", activePoolId);
}

function getSelectedPool() {
    return pools.find(pool => pool.id === selectedPoolId) || null;
}

function getActivePool() {
    return pools.find(pool => pool.id === activePoolId) || null;
}

function getPoolById(id) {
    return pools.find(pool => pool.id === id) || null;
}

function normalizeName(name) {
    return name.trim().replace(/\s+/g, "");
}

function normalizePhone(phone) {
    return phone.trim().replace(/\D/g, "");
}

function makeKey(name, phone) {
    return normalizeName(name) + "_" + normalizePhone(phone);
}

function makeId() {
    return "pool_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
}

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const randomIndex = Math.floor(Math.random() * (i + 1));
        [array[i], array[randomIndex]] = [array[randomIndex], array[i]];
    }
    return array;
}

function buildResultPool(total, wins) {
    const loses = total - wins;
    let resultPool = [];
    for (let i = 0; i < wins; i++) resultPool.push("당첨");
    for (let i = 0; i < loses; i++) resultPool.push("꽝");
    return shuffle(resultPool);
}

function buildRemainingPool(remainingWins, remainingLoses) {
    let resultPool = [];
    for (let i = 0; i < remainingWins; i++) resultPool.push("당첨");
    for (let i = 0; i < remainingLoses; i++) resultPool.push("꽝");
    return shuffle(resultPool);
}

function updateSettingPreview() {
    const total = Number(document.getElementById("totalSetting").value);
    const wins = Number(document.getElementById("winSetting").value);
    const loses = total - wins;
    const preview = document.getElementById("settingPreview");

    if (!Number.isInteger(total) || !Number.isInteger(wins) || total <= 0 || wins < 0 || wins > total) {
        preview.innerText = "총 결과표 개수와 당첨 개수를 올바르게 입력하세요.";
        return;
    }
    preview.innerText = `총 결과표 ${total}개 / 당첨 ${wins}개 / 꽝 ${loses}개로 생성됩니다.`;
}

function updateEditPreview() {
    const total = Number(document.getElementById("editTotalSetting").value);
    const wins = Number(document.getElementById("editWinSetting").value);
    const loses = total - wins;
    const preview = document.getElementById("editPreview");

    if (!Number.isInteger(total) || !Number.isInteger(wins) || total <= 0 || wins < 0 || wins > total) {
        preview.innerText = "총 결과표 개수와 당첨 개수를 올바르게 입력하세요.";
        return;
    }
    preview.innerText = `수정 후 총 결과표 ${total}개 / 당첨 ${wins}개 / 꽝 ${loses}개가 됩니다.`;
}

function createNewPoolFromForm() {
    const nameInput = document.getElementById("poolName");
    const total = Number(document.getElementById("totalSetting").value);
    const wins = Number(document.getElementById("winSetting").value);
    const name = nameInput.value.trim() || "이름 없는 결과표";

    if (!Number.isInteger(total) || total <= 0) {
        alert("총 결과표 개수는 1개 이상이어야 합니다.");
        return;
    }
    if (!Number.isInteger(wins) || wins < 0) {
        alert("당첨 개수는 0개 이상이어야 합니다.");
        return;
    }
    if (wins > total) {
        alert("당첨 개수는 총 결과표 개수보다 많을 수 없습니다.");
        return;
    }

    const pool = {
        id: makeId(),
        name,
        total,
        wins,
        loses: total - wins,
        resultPool: buildResultPool(total, wins),
        participants: {},
        history: [],
        createdAt: new Date().toLocaleString("ko-KR"),
        updatedAt: new Date().toLocaleString("ko-KR")
    };

    pools.push(pool);
    selectedPoolId = pool.id;
    saveAll();
    clearCreateForm();
    renderAll();
    alert("결과표가 생성되었습니다.");
}

function clearCreateForm() {
    document.getElementById("poolName").value = "";
    document.getElementById("totalSetting").value = 100;
    document.getElementById("winSetting").value = 10;
    updateSettingPreview();
}

function selectStatsPool(id) {
    selectedPoolId = id;
    saveAll();
    cancelEdit();
    renderAll();
}

function usePool(id) {
    activePoolId = id;
    selectedPoolId = id;
    saveAll();

    document.getElementById("result").innerText = "";
    document.getElementById("message").innerText = "";
    document.getElementById("participantName").value = "";
    document.getElementById("phoneLast4").value = "";
    document.getElementById("surveyButton").classList.add("hidden");

    showParticipantScreen();
}

function showParticipantScreen() {
    document.getElementById("adminScreen").classList.add("hidden");
    document.getElementById("participantScreen").classList.remove("hidden");
    renderActiveNotice();
    window.scrollTo({ top: 0, behavior: "smooth" });
}

function showAdminScreen() {
    document.getElementById("participantScreen").classList.add("hidden");
    document.getElementById("adminScreen").classList.remove("hidden");
    renderAll();
    window.scrollTo({ top: 0, behavior: "smooth" });
}

function editPool(id) {
    const pool = getPoolById(id);
    if (!pool) return;

    selectedPoolId = id;
    editingPoolId = id;
    saveAll();

    document.getElementById("editPoolName").value = pool.name;
    document.getElementById("editTotalSetting").value = pool.total;
    document.getElementById("editWinSetting").value = pool.wins;
    document.getElementById("editPanel").classList.remove("hidden");

    updateEditPreview();
    renderAll();
    document.getElementById("editPanel").scrollIntoView({ behavior: "smooth", block: "center" });
}

function saveEditPool() {
    const pool = getPoolById(editingPoolId);
    if (!pool) return;

    const name = document.getElementById("editPoolName").value.trim() || "이름 없는 결과표";
    const newTotal = Number(document.getElementById("editTotalSetting").value);
    const newWins = Number(document.getElementById("editWinSetting").value);

    if (!Number.isInteger(newTotal) || newTotal <= 0) {
        alert("총 결과표 개수는 1개 이상이어야 합니다.");
        return;
    }
    if (!Number.isInteger(newWins) || newWins < 0) {
        alert("당첨 개수는 0개 이상이어야 합니다.");
        return;
    }
    if (newWins > newTotal) {
        alert("당첨 개수는 총 결과표 개수보다 많을 수 없습니다.");
        return;
    }

    const usedTotal = pool.history.length;
    const usedWins = pool.history.filter(item => item.result === "당첨").length;
    const usedLoses = pool.history.filter(item => item.result === "꽝").length;
    const newLoses = newTotal - newWins;

    if (newTotal < usedTotal) {
        alert(`이미 ${usedTotal}명이 참여했습니다. 총 결과표 개수는 ${usedTotal}개보다 작게 줄일 수 없습니다.`);
        return;
    }
    if (newWins < usedWins) {
        alert(`이미 당첨이 ${usedWins}명 지급되었습니다. 당첨 개수는 ${usedWins}개보다 작게 줄일 수 없습니다.`);
        return;
    }
    if (newLoses < usedLoses) {
        alert(`이미 꽝이 ${usedLoses}명 지급되었습니다. 꽝 개수는 ${usedLoses}개보다 작게 줄일 수 없습니다.`);
        return;
    }

    const remainingWins = newWins - usedWins;
    const remainingLoses = newLoses - usedLoses;

    pool.name = name;
    pool.total = newTotal;
    pool.wins = newWins;
    pool.loses = newLoses;
    pool.resultPool = buildRemainingPool(remainingWins, remainingLoses);
    pool.updatedAt = new Date().toLocaleString("ko-KR");

    saveAll();
    cancelEdit();
    renderAll();
    alert("결과표가 수정되었습니다.");
}

function cancelEdit() {
    editingPoolId = "";
    document.getElementById("editPanel").classList.add("hidden");
    document.getElementById("editPoolName").value = "";
    document.getElementById("editTotalSetting").value = "";
    document.getElementById("editWinSetting").value = "";
    document.getElementById("editPreview").innerText = "";
}

function deletePool(id) {
    const pool = getPoolById(id);
    if (!pool) return;

    const ok = confirm(`"${pool.name}" 결과표를 삭제할까요?\n참여 기록도 함께 삭제됩니다.`);
    if (!ok) return;

    pools = pools.filter(item => item.id !== id);

    if (selectedPoolId === id) selectedPoolId = pools.length > 0 ? pools[0].id : "";
    if (activePoolId === id) activePoolId = "";
    if (editingPoolId === id) cancelEdit();

    saveAll();
    renderAll();
    alert("결과표가 삭제되었습니다.");
}

function joinDraw() {
    const pool = getActivePool();

    const nameInput = document.getElementById("participantName");
    const phoneInput = document.getElementById("phoneLast4");
    const resultBox = document.getElementById("result");
    const message = document.getElementById("message");
    const surveyButton = document.getElementById("surveyButton");

    const displayName = nameInput.value.trim();
    const phone = normalizePhone(phoneInput.value);
    const key = makeKey(displayName, phone);

    resultBox.className = "";
    message.innerText = "";
    surveyButton.classList.add("hidden");

    if (!pool) {
        alert("관리자가 먼저 사용할 결과표를 선택해야 합니다.");
        return;
    }
    if (!displayName) {
        alert("이름을 입력하세요.");
        return;
    }
    if (phone.length !== 4) {
        alert("휴대폰 뒤 4자리를 숫자로 입력하세요.");
        return;
    }

    if (pool.participants[key]) {
        showResult(pool.participants[key].result);
        message.innerText = "이미 참여한 정보입니다. 기존 결과를 다시 표시합니다.";
        surveyButton.classList.remove("hidden");
        return;
    }

    if (pool.resultPool.length === 0) {
        resultBox.innerText = "참여 마감";
        resultBox.className = "closed";
        message.innerText = "준비된 결과표가 모두 사용되었습니다.";
        return;
    }

    const assignedResult = pool.resultPool.shift();

    pool.participants[key] = {
        name: displayName,
        phone,
        result: assignedResult,
        time: new Date().toLocaleString("ko-KR")
    };

    pool.history.push(pool.participants[key]);
    pool.updatedAt = new Date().toLocaleString("ko-KR");

    saveAll();
    showResult(assignedResult);
    surveyButton.classList.remove("hidden");
}

function showResult(value) {
    const resultBox = document.getElementById("result");
    if (value === "당첨") {
        resultBox.innerText = "🎉 당첨";
        resultBox.className = "winner";
    } else {
        resultBox.innerText = "😢 꽝";
        resultBox.className = "loser";
    }
}

function renderAll() {
    renderPoolList();
    renderSelectedStats();
    renderActiveNotice();
}

function renderActiveNotice() {
    const pool = getActivePool();
    const notice = document.getElementById("activePoolNotice");
    notice.innerText = pool ? `사용 중인 이벤트: ${pool.name}` : "현재 사용 중인 이벤트가 없습니다.";
}

function renderPoolList() {
    const list = document.getElementById("poolList");

    if (pools.length === 0) {
        list.innerHTML = "생성된 결과표가 없습니다.";
        return;
    }

    list.innerHTML = pools.map(pool => {
        const totalUsed = pool.history.length;
        const winUsed = pool.history.filter(item => item.result === "당첨").length;
        const loseUsed = pool.history.filter(item => item.result === "꽝").length;
        const selectedClass = pool.id === selectedPoolId ? "selected-pool" : "";

        return `
            <div class="pool-item ${selectedClass}" onclick="selectStatsPool('${pool.id}')">
                <div class="pool-title">${escapeHTML(pool.name)} ${pool.id === selectedPoolId ? "✅ 선택됨" : ""}</div>
                <div>총 참여자: ${totalUsed}/${pool.total}</div>
                <div>당첨 지급: ${winUsed}/${pool.wins}</div>
                <div>꽝 지급: ${loseUsed}/${pool.loses}</div>
                <div class="notice">생성: ${pool.createdAt} / 수정: ${pool.updatedAt}</div>
                <div class="pool-actions" onclick="event.stopPropagation()">
                    <button class="green" onclick="usePool('${pool.id}')">사용하기</button>
                    <button class="orange" onclick="editPool('${pool.id}')">수정하기</button>
                    <button class="danger" onclick="deletePool('${pool.id}')">삭제하기</button>
                </div>
            </div>
        `;
    }).join("");
}

function renderSelectedStats() {
    const pool = getSelectedPool();
    const panel = document.getElementById("selectedStatsPanel");
    const badges = document.getElementById("eventBadges");
    const totalCount = document.getElementById("totalCount");
    const winCount = document.getElementById("winCount");
    const loseCount = document.getElementById("loseCount");
    const winnerList = document.getElementById("winnerList");
    const historyList = document.getElementById("historyList");

    if (!pool) {
        panel.classList.add("hidden");
        return;
    }

    panel.classList.remove("hidden");

    const totalParticipants = pool.history.length;
    const wins = pool.history.filter(item => item.result === "당첨").length;
    const loses = pool.history.filter(item => item.result === "꽝").length;

    totalCount.innerText = `${totalParticipants}/${pool.total}`;
    winCount.innerText = `${wins}/${pool.wins}`;
    loseCount.innerText = `${loses}/${pool.loses}`;

    badges.innerHTML = `
        <span class="badge">${escapeHTML(pool.name)}</span>
        <span class="badge">총 결과표 ${pool.total}개</span>
        <span class="badge">당첨 ${pool.wins}개</span>
        <span class="badge">꽝 ${pool.loses}개</span>
        <span class="badge">생성일 ${pool.createdAt}</span>
    `;

    const winners = pool.history.filter(item => item.result === "당첨");

    winnerList.innerHTML = winners.length === 0
        ? "당첨자가 없습니다."
        : winners.map((item, index) => `${index + 1}. ${escapeHTML(item.name)} / ${item.phone} / ${item.time}`).join("<br>");

    historyList.innerHTML = pool.history.length === 0
        ? "참여 기록이 없습니다."
        : pool.history.map((item, index) => `${index + 1}. ${escapeHTML(item.name)} / ${item.phone} / ${item.result} <span style="color:#777;">(${item.time})</span>`).join("<br>");
}

function goSurvey() {
    if (SURVEY_URL) {
        location.href = SURVEY_URL;
    } else {
        alert("현재는 설문조사 주소가 연결되어 있지 않습니다. 추후 SURVEY_URL에 설문 링크를 넣으면 이동할 수 있습니다.");
    }
}

function downloadCSV() {
    const pool = getSelectedPool();

    if (!pool) {
        alert("선택된 결과표가 없습니다.");
        return;
    }

    if (pool.history.length === 0) {
        alert("다운로드할 참여 기록이 없습니다.");
        return;
    }

    let csv = "\ufeff결과표명,순번,이름,휴대폰뒤4자리,결과,참여시간\n";

    pool.history.forEach((item, index) => {
        csv += `"${csvSafe(pool.name)}",${index + 1},"${csvSafe(item.name)}","${item.phone}","${item.result}","${item.time}"\n`;
    });

    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");

    const safeName = pool.name.replace(/[\\/:*?"<>|]/g, "_");
    const now = new Date();
    const fileDate = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;

    link.setAttribute("href", url);
    link.setAttribute("download", `체육센터_경품추첨_${safeName}_${fileDate}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
}

function csvSafe(value) {
    return String(value).replace(/"/g, '""');
}

function escapeHTML(value) {
    return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

document.getElementById("totalSetting").addEventListener("input", updateSettingPreview);
document.getElementById("winSetting").addEventListener("input", updateSettingPreview);
document.getElementById("editTotalSetting").addEventListener("input", updateEditPreview);
document.getElementById("editWinSetting").addEventListener("input", updateEditPreview);

document.getElementById("phoneLast4").addEventListener("input", function() {
    this.value = this.value.replace(/\D/g, "").slice(0, 4);
});

updateSettingPreview();
renderAll();
