<style>

<body>
<div class="container">
    <h1>체육센터 경품 추첨 관리자</h1>
    <p class="desc">
        결과표를 만들고 관리하는 관리자 전용 화면입니다.<br>
        참가자에게는 <b>참가자 링크</b>만 공유하세요.
    </p>

    <div class="card">
        <h2>결과표 만들기</h2>
        <p class="desc">새로운 행사 결과표를 생성하는 공간입니다.</p>
        <div class="setting-box">
            <div class="form-row">
                <input type="text" id="poolName" placeholder="결과표 이름 예: 7월 이벤트">
                <input type="number" id="totalSetting" min="1" max="1000" value="100" placeholder="총 결과표 개수">
                <input type="number" id="winSetting" min="0" max="1000" value="10" placeholder="당첨 개수">
            </div>
            <p id="settingPreview" class="notice"></p>
            <button class="green" onclick="createNewPoolFromForm()">결과표 생성</button>
        </div>
    </div>

    <div class="card">
        <h2>결과표 관리</h2>
        <p class="desc">이벤트를 선택하면 아래에 통계와 참가자용 링크가 표시됩니다.</p>

        <div id="editPanel" class="edit-box hidden">
            <h3>결과표 수정하기</h3>
            <div class="form-row">
                <input type="text" id="editPoolName" placeholder="결과표 이름">
                <input type="number" id="editTotalSetting" min="1" max="1000" placeholder="총 결과표 개수">
                <input type="number" id="editWinSetting" min="0" max="1000" placeholder="당첨 개수">
            </div>
            <p id="editPreview" class="notice"></p>
            <button class="orange" onclick="saveEditPool()">수정 저장</button>
            <button class="light" onclick="cancelEdit()">수정 취소</button>
        </div>

        <div id="poolList" class="list">불러오는 중...</div>

        <div id="selectedStatsPanel" class="stats-panel hidden">
            <h3>통계 자료</h3>
            <div id="eventBadges"></div>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">총 참여자</div>
                    <div id="totalCount" class="stat-number">0/0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">당첨 지급</div>
                    <div id="winCount" class="stat-number">0/0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">꽝 지급</div>
                    <div id="loseCount" class="stat-number">0/0</div>
                </div>
            </div>

            <div class="top-actions">
                <button class="light" onclick="downloadCSV()">엑셀용 기록 다운로드</button>
                <button class="green" onclick="copyParticipantLink()">참가자 링크 복사</button>
            </div>

            <div id="participantLinkText" class="participant-link-box"></div>

            <h3>당첨자 명단</h3>
            <div id="winnerList" class="list">당첨자가 없습니다.</div>

            <h3>참여 기록</h3>
            <div id="historyList" class="list">참여 기록이 없습니다.</div>
        </div>
    </div>
</div>

<script>
let pools = [];
let selectedPoolId = "";
let editingPoolId = "";
let unsubscribe = null;

function makeId() {
    return "pool_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
}

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const randomIndex = Math.floor(Math.random() * (i + 1));
        [array[i], array[randomIndex]] = [array[randomIndex], array[i]];
    }
    return array;
}

function buildResultPool(total, wins) {
    const loses = total - wins;
    let resultPool = [];
    for (let i = 0; i < wins; i++) resultPool.push("당첨");
    for (let i = 0; i < loses; i++) resultPool.push("꽝");
    return shuffle(resultPool);
}

function buildRemainingPool(remainingWins, remainingLoses) {
    let resultPool = [];
    for (let i = 0; i < remainingWins; i++) resultPool.push("당첨");
    for (let i = 0; i < remainingLoses; i++) resultPool.push("꽝");
    return shuffle(resultPool);
}

function getSelectedPool() {
    return pools.find(pool => pool.id === selectedPoolId) || null;
}

function getPoolById(id) {
    return pools.find(pool => pool.id === id) || null;
}

function updateSettingPreview() {
    const total = Number(document.getElementById("totalSetting").value);
    const wins = Number(document.getElementById("winSetting").value);
    const loses = total - wins;
    const preview = document.getElementById("settingPreview");

    if (!Number.isInteger(total) || !Number.isInteger(wins) || total <= 0 || wins < 0 || wins > total) {
        preview.innerText = "총 결과표 개수와 당첨 개수를 올바르게 입력하세요.";
        return;
    }
    preview.innerText = `총 결과표 ${total}개 / 당첨 ${wins}개 / 꽝 ${loses}개로 생성됩니다.`;
}

function updateEditPreview() {
    const total = Number(document.getElementById("editTotalSetting").value);
    const wins = Number(document.getElementById("editWinSetting").value);
    const loses = total - wins;
    const preview = document.getElementById("editPreview");

    if (!Number.isInteger(total) || !Number.isInteger(wins) || total <= 0 || wins < 0 || wins > total) {
        preview.innerText = "총 결과표 개수와 당첨 개수를 올바르게 입력하세요.";
        return;
    }
    preview.innerText = `수정 후 총 결과표 ${total}개 / 당첨 ${wins}개 / 꽝 ${loses}개가 됩니다.`;
}

async function createNewPoolFromForm() {
    const nameInput = document.getElementById("poolName");
    const total = Number(document.getElementById("totalSetting").value);
    const wins = Number(document.getElementById("winSetting").value);
    const name = nameInput.value.trim() || "이름 없는 결과표";

    if (!Number.isInteger(total) || total <= 0) return alert("총 결과표 개수는 1개 이상이어야 합니다.");
    if (!Number.isInteger(wins) || wins < 0) return alert("당첨 개수는 0개 이상이어야 합니다.");
    if (wins > total) return alert("당첨 개수는 총 결과표 개수보다 많을 수 없습니다.");

    const id = makeId();
    await eventsRef.doc(id).set({
        id,
        name,
        total,
        wins,
        loses: total - wins,
        resultPool: buildResultPool(total, wins),
        participants: {},
        history: [],
        createdAt: new Date().toLocaleString("ko-KR"),
        updatedAt: new Date().toLocaleString("ko-KR")
    });

    selectedPoolId = id;
    document.getElementById("poolName").value = "";
    document.getElementById("totalSetting").value = 100;
    document.getElementById("winSetting").value = 10;
    updateSettingPreview();
    alert("결과표가 생성되었습니다.");
}

function selectStatsPool(id) {
    selectedPoolId = id;
    cancelEdit();
    renderAll();
}

function editPool(id) {
    const pool = getPoolById(id);
    if (!pool) return;

    selectedPoolId = id;
    editingPoolId = id;

    document.getElementById("editPoolName").value = pool.name;
    document.getElementById("editTotalSetting").value = pool.total;
    document.getElementById("editWinSetting").value = pool.wins;
    document.getElementById("editPanel").classList.remove("hidden");

    updateEditPreview();
    renderAll();
    document.getElementById("editPanel").scrollIntoView({ behavior: "smooth", block: "center" });
}

async function saveEditPool() {
    const pool = getPoolById(editingPoolId);
    if (!pool) return;

    const name = document.getElementById("editPoolName").value.trim() || "이름 없는 결과표";
    const newTotal = Number(document.getElementById("editTotalSetting").value);
    const newWins = Number(document.getElementById("editWinSetting").value);

    if (!Number.isInteger(newTotal) || newTotal <= 0) return alert("총 결과표 개수는 1개 이상이어야 합니다.");
    if (!Number.isInteger(newWins) || newWins < 0) return alert("당첨 개수는 0개 이상이어야 합니다.");
    if (newWins > newTotal) return alert("당첨 개수는 총 결과표 개수보다 많을 수 없습니다.");

    const history = pool.history || [];
    const usedTotal = history.length;
    const usedWins = history.filter(item => item.result === "당첨").length;
    const usedLoses = history.filter(item => item.result === "꽝").length;
    const newLoses = newTotal - newWins;

    if (newTotal < usedTotal) return alert(`이미 ${usedTotal}명이 참여했습니다. 총 결과표 개수는 ${usedTotal}개보다 작게 줄일 수 없습니다.`);
    if (newWins < usedWins) return alert(`이미 당첨이 ${usedWins}명 지급되었습니다. 당첨 개수는 ${usedWins}개보다 작게 줄일 수 없습니다.`);
    if (newLoses < usedLoses) return alert(`이미 꽝이 ${usedLoses}명 지급되었습니다. 꽝 개수는 ${usedLoses}개보다 작게 줄일 수 없습니다.`);

    const remainingWins = newWins - usedWins;
    const remainingLoses = newLoses - usedLoses;

    await eventsRef.doc(pool.id).update({
        name,
        total: newTotal,
        wins: newWins,
        loses: newLoses,
        resultPool: buildRemainingPool(remainingWins, remainingLoses),
        updatedAt: new Date().toLocaleString("ko-KR")
    });

    cancelEdit();
    alert("결과표가 수정되었습니다.");
}

function cancelEdit() {
    editingPoolId = "";
    document.getElementById("editPanel").classList.add("hidden");
    document.getElementById("editPoolName").value = "";
    document.getElementById("editTotalSetting").value = "";
    document.getElementById("editWinSetting").value = "";
    document.getElementById("editPreview").innerText = "";
}

async function deletePool(id) {
    const pool = getPoolById(id);
    if (!pool) return;

    const ok = confirm(`"${pool.name}" 결과표를 삭제할까요?\n참여 기록도 함께 삭제됩니다.`);
    if (!ok) return;

    await eventsRef.doc(id).delete();
    if (selectedPoolId === id) selectedPoolId = "";
    if (editingPoolId === id) cancelEdit();
    alert("결과표가 삭제되었습니다.");
}

function getParticipantLink(poolId) {
    const base = location.href.substring(0, location.href.lastIndexOf("/") + 1);
    return `${base}draw.html?event=${encodeURIComponent(poolId)}`;
}

function copyParticipantLink() {
    const pool = getSelectedPool();
    if (!pool) return alert("선택된 결과표가 없습니다.");
    const link = getParticipantLink(pool.id);

    navigator.clipboard.writeText(link).then(() => {
        alert("참가자 링크가 복사되었습니다. 이 링크로 QR코드를 만들면 됩니다.");
    }).catch(() => {
        prompt("아래 링크를 복사하세요.", link);
    });
}

function renderAll() {
    renderPoolList();
    renderSelectedStats();
}

function renderPoolList() {
    const list = document.getElementById("poolList");

    if (pools.length === 0) {
        list.innerHTML = "생성된 결과표가 없습니다.";
        return;
    }

    list.innerHTML = pools.map(pool => {
        const history = pool.history || [];
        const totalUsed = history.length;
        const winUsed = history.filter(item => item.result === "당첨").length;
        const loseUsed = history.filter(item => item.result === "꽝").length;
        const selectedClass = pool.id === selectedPoolId ? "selected-pool" : "";

        return `
            <div class="pool-item ${selectedClass}" onclick="selectStatsPool('${pool.id}')">
                <div class="pool-title">${escapeHTML(pool.name)} ${pool.id === selectedPoolId ? "✅ 선택됨" : ""}</div>
                <div>총 참여자: ${totalUsed}/${pool.total}</div>
                <div>당첨 지급: ${winUsed}/${pool.wins}</div>
                <div>꽝 지급: ${loseUsed}/${pool.loses}</div>
                <div class="notice">생성: ${pool.createdAt} / 수정: ${pool.updatedAt}</div>
                <div class="pool-actions" onclick="event.stopPropagation()">
                    <button class="green" onclick="window.open('${getParticipantLink(pool.id)}','_blank')">사용하기</button>
                    <button class="orange" onclick="editPool('${pool.id}')">수정하기</button>
                    <button class="danger" onclick="deletePool('${pool.id}')">삭제하기</button>
                </div>
            </div>
        `;
    }).join("");
}

function renderSelectedStats() {
    const pool = getSelectedPool();
    const panel = document.getElementById("selectedStatsPanel");

    if (!pool) {
        panel.classList.add("hidden");
        return;
    }

    panel.classList.remove("hidden");

    const history = pool.history || [];
    const totalParticipants = history.length;
    const wins = history.filter(item => item.result === "당첨").length;
    const loses = history.filter(item => item.result === "꽝").length;
    const winners = history.filter(item => item.result === "당첨");

    document.getElementById("totalCount").innerText = `${totalParticipants}/${pool.total}`;
    document.getElementById("winCount").innerText = `${wins}/${pool.wins}`;
    document.getElementById("loseCount").innerText = `${loses}/${pool.loses}`;

    document.getElementById("eventBadges").innerHTML = `
        <span class="badge">${escapeHTML(pool.name)}</span>
        <span class="badge">총 결과표 ${pool.total}개</span>
        <span class="badge">당첨 ${pool.wins}개</span>
        <span class="badge">꽝 ${pool.loses}개</span>
        <span class="badge">생성일 ${pool.createdAt}</span>
    `;

    document.getElementById("participantLinkText").innerText = `참가자 링크: ${getParticipantLink(pool.id)}`;

    document.getElementById("winnerList").innerHTML = winners.length === 0
        ? "당첨자가 없습니다."
        : winners.map((item, index) => `${index + 1}. ${escapeHTML(item.name)} / ${item.phone} / ${item.time}`).join("<br>");

    document.getElementById("historyList").innerHTML = history.length === 0
        ? "참여 기록이 없습니다."
        : history.map((item, index) => `${index + 1}. ${escapeHTML(item.name)} / ${item.phone} / ${item.result} <span style="color:#777;">(${item.time})</span>`).join("<br>");
}

function downloadCSV() {
    const pool = getSelectedPool();

    if (!pool) return alert("선택된 결과표가 없습니다.");
    const history = pool.history || [];
    if (history.length === 0) return alert("다운로드할 참여 기록이 없습니다.");

    let csv = "\ufeff결과표명,순번,이름,휴대폰뒤4자리,결과,참여시간\n";

    history.forEach((item, index) => {
        csv += `"${csvSafe(pool.name)}",${index + 1},"${csvSafe(item.name)}","${item.phone}","${item.result}","${item.time}"\n`;
    });

    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");

    const safeName = pool.name.replace(/[\\/:*?"<>|]/g, "_");
    const now = new Date();
    const fileDate = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;

    link.setAttribute("href", url);
    link.setAttribute("download", `체육센터_경품추첨_${safeName}_${fileDate}.csv`);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
}

function csvSafe(value) {
    return String(value).replace(/"/g, '""');
}

function escapeHTML(value) {
    return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function startRealtimeListener() {
    if (unsubscribe) unsubscribe();

    unsubscribe = eventsRef.onSnapshot(snapshot => {
        pools = snapshot.docs.map(doc => doc.data());
        pools.sort((a, b) => String(b.createdAt).localeCompare(String(a.createdAt)));
        if (!selectedPoolId && pools.length > 0) selectedPoolId = pools[0].id;
        if (selectedPoolId && !pools.find(pool => pool.id === selectedPoolId)) {
            selectedPoolId = pools.length > 0 ? pools[0].id : "";
        }
        renderAll();
    }, error => {
        console.error(error);
        alert("데이터를 불러오지 못했습니다. Firebase Firestore 설정을 확인해 주세요.");
    });
}

document.getElementById("totalSetting").addEventListener("input", updateSettingPreview);
